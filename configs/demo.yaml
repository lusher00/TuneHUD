# tunehud_gateway/configs/demo.yaml
# Connect to the local demo node

device: "TuneHUD Demo — Motor Velocity Loop"

server:
  host: 0.0.0.0
  port: 8765

stream:
  max_hz:     100
  default_hz: 20

transport:
  type: websocket
  name: demo_node
  host: 127.0.0.1
  port: 8766

display:
  gauges:
    - param: pv
      type: gauge
      min: -100
      max: 100
    - param: output
      type: bar
      min: -1
      max: 1
    - param: error
      type: numeric
  plots:
    - [pv, setpoint]
    - [error, output]
